<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — ParkEase</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🅿️</div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your ParkEase account</div>
    </div>

    <div class="alert alert-error" id="alert-box" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="email" placeholder="john@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:18px">
      <a href="#" style="font-size:12px;color:var(--blue2)">Forgot password?</a>
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-footer">
      Don't have an account?
      <button class="auth-link" onclick="window.location.href='register.html'">Create one free →</button>
    </div>

    <div style="text-align:center;margin-top:12px">
      <button onclick="toggleTheme()" style="background:none;border:none;font-size:20px;cursor:pointer" id="theme-btn">☀️</button>
    </div>

    <!-- Demo credentials hint -->
    <div style="margin-top:16px;padding:12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:8px;font-size:12px;color:var(--text3)">
      <div style="font-weight:600;color:var(--blue2);margin-bottom:4px">Demo Accounts:</div>
      <div>👤 Driver: john@example.com / password123</div>
      <div>🏢 Owner: mary@example.com / password123</div>
      <div>👑 Admin: admin@parkease.com / password123</div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
initTheme();
const tBtn = document.getElementById('theme-btn');
if(tBtn) tBtn.textContent = (localStorage.getItem('pe_theme')||'dark')==='dark'?'☀️':'🌙';

// If already logged in, redirect
if(Auth.isLoggedIn()) Auth.redirectToDashboard();

// Allow Enter key
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');

  if(!email || !password) { showAlert('Please enter email and password'); return; }

  btn.textContent = 'Signing in...';
  btn.disabled    = true;
  hideAlert();

  try {
    const res = await API.auth.login({ email, password });
    Auth.login(res.token, res.user);
    showToast('Login successful! Redirecting...', 'success');
    setTimeout(() => Auth.redirectToDashboard(), 800);
  } catch(err) {
    showAlert(err.message || 'Login failed. Please try again.');
    btn.textContent = 'Sign In';
    btn.disabled    = false;
  }
}
</script>
</body>
</html>
