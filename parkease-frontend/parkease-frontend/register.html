<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register — ParkEase</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="width:480px">
    <div class="auth-logo">
      <div class="auth-logo-icon">🅿️</div>
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Join thousands of drivers and owners</div>
    </div>

    <div class="alert alert-error" id="alert-box" style="display:none"></div>

    <!-- Role Selection -->
    <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.03em">I WANT TO</div>
    <div class="role-select" id="role-select">
      <div class="role-opt selected" data-role="driver" onclick="selectRole('driver')">
        <div class="role-icon">🚗</div>
        <div class="role-name">Park My Car</div>
        <div class="role-desc">Find & book spots</div>
      </div>
      <div class="role-opt" data-role="owner" onclick="selectRole('owner')">
        <div class="role-icon">🏢</div>
        <div class="role-name">List My Spot</div>
        <div class="role-desc">Earn from my space</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input type="text" class="form-input" id="fname" placeholder="John">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-input" id="lname" placeholder="Doe">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="email" placeholder="john@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input type="tel" class="form-input" id="phone" placeholder="+91 98765 43210">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="Min. 6 characters">
    </div>

    <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">Create Account</button>

    <div class="auth-footer" style="margin-top:14px">
      Already have an account?
      <button class="auth-link" onclick="window.location.href='login.html'">Sign in</button>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text3)">
      By signing up you agree to our <a href="#" style="color:var(--blue2)">Terms</a> and <a href="#" style="color:var(--blue2)">Privacy Policy</a>
    </div>
    <div style="text-align:center;margin-top:10px">
      <button onclick="toggleTheme()" style="background:none;border:none;font-size:20px;cursor:pointer" id="theme-btn">☀️</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
initTheme();
const tBtn = document.getElementById('theme-btn');
if(tBtn) tBtn.textContent = (localStorage.getItem('pe_theme')||'dark')==='dark'?'☀️':'🌙';

if(Auth.isLoggedIn()) Auth.redirectToDashboard();

// Pre-select role from URL param
const urlRole = new URLSearchParams(window.location.search).get('role');
if(urlRole) selectRole(urlRole);

function selectRole(role) {
  document.querySelectorAll('.role-opt').forEach(o => o.classList.toggle('selected', o.dataset.role===role));
}

function getSelectedRole() {
  return document.querySelector('.role-opt.selected')?.dataset.role || 'driver';
}

async function doRegister() {
  const fname    = document.getElementById('fname').value.trim();
  const lname    = document.getElementById('lname').value.trim();
  const email    = document.getElementById('email').value.trim();
  const phone    = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const role     = getSelectedRole();
  const btn      = document.getElementById('reg-btn');

  if(!fname||!email||!password) { showAlert('Please fill in all required fields'); return; }
  if(password.length < 6) { showAlert('Password must be at least 6 characters'); return; }

  btn.textContent = 'Creating account...';
  btn.disabled    = true;
  hideAlert();

  try {
    const res = await API.auth.register({ name:`${fname} ${lname}`, email, phone, password, role });
    Auth.login(res.token, res.user);
    showToast('Account created! Welcome to ParkEase! 🎉', 'success');
    setTimeout(() => Auth.redirectToDashboard(), 900);
  } catch(err) {
    showAlert(err.message || 'Registration failed. Please try again.');
    btn.textContent = 'Create Account';
    btn.disabled    = false;
  }
}
</script>
</body>
</html>
